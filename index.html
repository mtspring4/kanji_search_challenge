<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>漢字間違い探し - 選べる2つのモード</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;700;900&display=swap');
        
        body {
            font-family: 'Noto Serif JP', serif;
            background-color: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: none;
        }

        #game-frame {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 450px;
            max-height: 850px;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }

        .kanji-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: repeat(8, 1fr); 
            gap: 2px;
            width: 100%;
            height: 100%;
            max-height: 520px; 
        }

        .kanji-cell {
            background: white;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: min(7.5vw, 32px);
            font-weight: 500; 
            cursor: pointer;
            user-select: none;
            color: #000000;
            border: 1px solid #e2e8f0;
            transition: all 0.1s;
        }

        .found {
            color: #ffffff !important;
            background-color: #dc2626 !important;
            font-weight: 900 !important;
            border-color: #dc2626 !important;
            z-index: 10;
            transform: scale(1.05);
        }

        .missed {
            background-color: #e2e8f0 !important;
            color: #94a3b8 !important;
            border-color: #cbd5e1 !important;
            cursor: default;
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 30;
            padding: 20px;
            box-sizing: border-box;
        }

        .scroll-area {
            flex: 1;
            width: 100%;
            overflow-y: auto;
            background: #f8fafc;
            border-radius: 12px;
            padding: 10px;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .animate-shake {
            animation: shake 0.2s ease-in-out 0s 2;
        }

        .heart {
            color: #ef4444;
            font-size: 1.25rem;
        }
        .heart-empty {
            color: #cbd5e1;
            font-size: 1.25rem;
        }
    </style>
</head>
<body>

    <div id="game-frame">
        <div class="flex flex-col h-full bg-slate-50">
            <!-- Header -->
            <div class="bg-white border-b border-slate-200">
                <div class="py-2 text-center flex justify-between px-4 items-center">
                    <span id="round-counter" class="text-[10px] font-bold text-slate-400 font-sans uppercase">ROUND 1 / 10</span>
                    <h1 id="mode-title" class="text-xs font-black text-slate-800 tracking-tighter">漢字探し十番勝負</h1>
                    <span id="mistake-container" class="flex gap-0.5"></span>
                </div>

                <div class="flex justify-between items-center px-6 py-3">
                    <div class="flex items-center gap-3">
                        <div class="text-center">
                            <p class="text-[9px] text-slate-400 font-bold mb-1 uppercase font-sans">探す字</p>
                            <p id="target-kanji-display" class="text-4xl font-black text-red-600 leading-none">-</p>
                        </div>
                        <div class="bg-red-50 px-2 py-1 rounded-lg border border-red-100 mt-2">
                            <p id="count-display" class="text-red-600 font-black font-mono text-lg leading-none">0 / 3</p>
                        </div>
                    </div>
                    <div id="timer-container" class="text-center">
                        <p class="text-[9px] text-slate-400 font-bold mb-1 uppercase font-sans">残り時間</p>
                        <p id="time-display" class="text-xl font-mono font-bold text-slate-900 leading-none">10.00</p>
                    </div>
                </div>

                <div id="timer-bar" class="w-full h-1.5 bg-slate-200">
                    <div id="timer-bar-inner" class="h-full bg-gradient-to-r from-red-600 to-orange-400 w-full transition-all duration-100 ease-linear"></div>
                </div>
            </div>

            <!-- Grid Area -->
            <div class="flex-1 flex items-center justify-center p-2 bg-slate-50 overflow-hidden relative">
                <div id="grid" class="kanji-grid"></div>
                <!-- Overlay for Pause/Quit -->
                <div id="pause-overlay" class="absolute inset-0 bg-slate-900/90 z-20 hidden flex flex-col items-center justify-center text-white">
                    <p class="text-lg font-bold mb-6">一時停止中</p>
                </div>
            </div>
            
            <div class="py-2 px-4 flex justify-between items-center bg-white text-[10px] font-bold border-t border-slate-200">
                <span class="text-slate-500 font-sans">背景の字: <span id="base-kanji-hint" class="text-slate-900 text-base font-serif">-</span></span>
                <div class="flex items-center gap-2">
                    <span id="mode-indicator" class="bg-slate-100 px-2 py-0.5 rounded text-slate-400 uppercase">NORMAL</span>
                    <button id="quit-btn" class="bg-slate-200 hover:bg-slate-300 text-slate-600 px-3 py-1 rounded transition-colors active:scale-95">やめる</button>
                </div>
            </div>
        </div>

        <!-- Start Screen -->
        <div id="start-screen" class="screen bg-slate-900 text-white">
            <div class="mb-10 text-center px-4">
                <div class="text-7xl mb-6">🖋️</div>
                <h2 class="text-4xl font-black mb-1">漢字探し十番勝負</h2>
                <p class="text-slate-400 text-[10px] font-sans tracking-widest mb-6">KANJI SEARCH CHALLENGE</p>
                <div class="bg-white/10 py-3 px-4 rounded-xl border border-white/5 inline-block">
                    <p class="text-sm font-bold text-yellow-400">
                        表示された漢字の中から<br>３つの違う漢字をさがせ！
                    </p>
                </div>
            </div>
            
            <div class="flex flex-col gap-4 w-full px-6">
                <button id="start-hard-btn" class="bg-red-600 hover:bg-red-500 text-white py-5 rounded-2xl shadow-xl active:scale-95 transition-all text-left px-8 relative overflow-hidden group">
                    <div class="relative z-10">
                        <p class="text-xl font-black">ガチ勝負モード</p>
                        <p class="text-[10px] opacity-80 font-sans">制限時間10秒 / 10回戦</p>
                    </div>
                    <span class="absolute right-6 top-1/2 -translate-y-1/2 text-3xl opacity-20 group-hover:opacity-40 transition-opacity">⚡</span>
                </button>

                <button id="start-easy-btn" class="bg-slate-700 hover:bg-slate-600 text-white py-5 rounded-2xl shadow-xl active:scale-95 transition-all text-left px-8 relative overflow-hidden group">
                    <div class="relative z-10">
                        <p class="text-xl font-black">じっくりモード</p>
                        <p class="text-[10px] opacity-80 font-sans">時間無制限 / お手つき3回まで</p>
                    </div>
                    <span class="absolute right-6 top-1/2 -translate-y-1/2 text-3xl opacity-20 group-hover:opacity-40 transition-opacity">☕</span>
                </button>
            </div>
            
            <p class="mt-8 text-[10px] text-slate-500 font-sans">収録ペア数: 400以上</p>
        </div>

        <!-- Quit Confirmation Dialog -->
        <div id="confirm-screen" class="screen bg-black/80 backdrop-blur-md hidden z-[50]">
            <div class="bg-white rounded-3xl p-8 shadow-2xl w-[85%] max-w-[320px] text-center">
                <div class="text-4xl mb-4">🚪</div>
                <h3 class="text-xl font-black text-slate-800 mb-2">確認</h3>
                <p class="text-sm text-slate-500 font-bold mb-8 leading-relaxed">
                    ゲームをやめて<br>タイトルに戻りますか？
                </p>
                <div class="flex flex-col gap-3">
                    <button id="confirm-quit-yes" class="bg-red-600 text-white font-black py-4 rounded-2xl active:scale-95 transition-transform shadow-lg shadow-red-200">
                        タイトルに戻る
                    </button>
                    <button id="confirm-quit-no" class="bg-slate-100 text-slate-500 font-bold py-3 rounded-2xl active:scale-95 transition-transform">
                        ゲームを続ける
                    </button>
                </div>
            </div>
        </div>

        <!-- Inter Round Info -->
        <div id="inter-screen" class="screen bg-black/70 backdrop-blur-sm hidden">
            <div class="bg-white rounded-2xl p-6 shadow-2xl w-full max-w-[340px] text-center">
                <div id="inter-icon" class="text-4xl mb-1"></div>
                <h2 id="inter-text" class="text-2xl font-black mb-3"></h2>
                
                <div class="bg-slate-50 rounded-xl p-4 text-left font-serif mb-4">
                    <div class="flex items-center mb-4">
                        <span id="info-target-char" class="text-4xl text-red-600 font-black mr-4 bg-white p-2 rounded-lg border border-red-100 shadow-sm w-12 h-12 flex items-center justify-center">-</span>
                        <div class="overflow-hidden">
                            <p class="text-[10px] text-red-400 font-bold uppercase mb-0.5">探した字</p>
                            <p id="info-target-yomi" class="font-bold text-slate-800 text-sm leading-tight">-</p>
                            <p id="info-target-jukugo" class="text-xs text-slate-500 truncate">-</p>
                        </div>
                    </div>
                    <div class="flex items-center pt-4 border-t border-slate-200">
                        <span id="info-base-char" class="text-4xl text-slate-800 font-black mr-4 bg-white p-2 rounded-lg border border-slate-200 shadow-sm w-12 h-12 flex items-center justify-center">-</span>
                        <div class="overflow-hidden">
                            <p class="text-[10px] text-slate-400 font-bold uppercase mb-0.5">基本の字</p>
                            <p id="info-base-yomi" class="font-bold text-slate-800 text-sm leading-tight">-</p>
                            <p id="info-base-jukugo" class="text-xs text-slate-500 truncate">-</p>
                        </div>
                    </div>
                </div>

                <button id="next-btn" class="bg-slate-900 text-white font-bold py-3 px-8 rounded-xl w-full active:scale-95 transition-transform">
                    次へ
                </button>
            </div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="screen bg-slate-900 text-white hidden">
            <div class="w-full flex flex-col h-full max-w-sm">
                <h2 class="text-2xl font-black mb-4 text-center mt-4 text-yellow-400">戦績発表</h2>
                
                <div class="bg-slate-800 rounded-2xl p-4 mb-4 text-center border border-slate-700 shadow-inner">
                    <p id="result-label" class="text-[10px] text-slate-400 font-bold mb-1">正解ラウンド数</p>
                    <p class="text-5xl font-black text-white"><span id="correct-total">0</span><span class="text-xl font-serif text-slate-400">/10</span></p>
                </div>

                <div class="text-[10px] font-bold text-slate-400 mb-2 px-1 uppercase tracking-widest">History</div>
                <div id="history-list" class="scroll-area text-slate-900 mb-4"></div>

                <button id="restart-btn" class="bg-red-600 text-white text-lg font-bold py-4 px-10 rounded-xl w-full font-sans shadow-xl active:scale-95 transition-all mb-4">
                    タイトルに戻る
                </button>
            </div>
        </div>
    </div>

        const TOTAL_ROUNDS = 10;
        const GRID_TOTAL = 48;
        const TARGET_COUNT = 3;
        const INITIAL_TIME = 10000;
        const MAX_MISTAKES = 3;

        let gameMode = 'HARD'; 
        let currentRound = 1;
        let correctRounds = 0;
        let questionStack = []; 
        let roundResults = []; 
        let currentPair = null;
        let isPlaying = false;
        let isPaused = false;
        let timeLeft = INITIAL_TIME;
        let foundCount = 0;
        let mistakes = 0;
        let lastTimestamp = 0;
        let animationFrameId = null;

        const gridElement = document.getElementById('grid');
        const targetDisplay = document.getElementById('target-kanji-display');
        const countDisplay = document.getElementById('count-display');
        const timeDisplay = document.getElementById('time-display');
        const timerBarInner = document.getElementById('timer-bar-inner');
        const baseHintDisplay = document.getElementById('base-kanji-hint');
        const roundCounter = document.getElementById('round-counter');
        const mistakeContainer = document.getElementById('mistake-container');
        const interScreen = document.getElementById('inter-screen');
        const startScreen = document.getElementById('start-screen');
        const resultScreen = document.getElementById('result-screen');
        const confirmScreen = document.getElementById('confirm-screen');
        const pauseOverlay = document.getElementById('pause-overlay');
        const modeIndicator = document.getElementById('mode-indicator');
        const timerContainer = document.getElementById('timer-container');
        const timerBar = document.getElementById('timer-bar');

        function selectMode(mode) {
            gameMode = mode;
            startGame();
        }

        function startGame() {
            currentRound = 1;
            correctRounds = 0;
            roundResults = [];
            isPaused = false;
            
            startScreen.classList.add('hidden');
            resultScreen.classList.add('hidden');
            interScreen.classList.add('hidden');
            confirmScreen.classList.add('hidden');
            pauseOverlay.classList.add('hidden');

            if (gameMode === 'EASY') {
                modeIndicator.innerText = 'じっくり';
                timerContainer.classList.add('invisible');
                timerBar.classList.add('invisible');
            } else {
                modeIndicator.innerText = 'ガチ勝負';
                timerContainer.classList.remove('invisible');
                timerBar.classList.remove('invisible');
            }
            
            let shuffled = [...PAIRS_LIST].sort(() => 0.5 - Math.random());
            let selected = shuffled.slice(0, TOTAL_ROUNDS);

            questionStack = selected.map(p => {
                const isSwapped = Math.random() > 0.5;
                const char1 = isSwapped ? p[1] : p[0];
                const char2 = isSwapped ? p[0] : p[1];
                const d1 = K_DICT[char1] || [char1, "未登録"];
                const d2 = K_DICT[char2] || [char2, "未登録"];
                return {
                    target: { c: char1, y: d1[0], j: d1[1] },
                    base: { c: char2, y: d2[0], j: d2[1] }
                };
            });

            initRound();
        }

        function updateMistakeDisplay() {
            mistakeContainer.innerHTML = '';
            if (gameMode === 'EASY') {
                for (let i = 0; i < MAX_MISTAKES; i++) {
                    const icon = document.createElement('span');
                    icon.className = i < (MAX_MISTAKES - mistakes) ? 'heart' : 'heart-empty';
                    icon.innerText = '♥';
                    mistakeContainer.appendChild(icon);
                }
            }
        }

        function initRound() {
            gridElement.innerHTML = '';
            foundCount = 0;
            mistakes = 0;
            isPaused = false;
            pauseOverlay.classList.add('hidden');
            currentPair = questionStack[currentRound - 1];
            
            targetDisplay.innerText = currentPair.target.c;
            baseHintDisplay.innerText = currentPair.base.c;
            roundCounter.innerText = `ROUND ${currentRound} / 10`;
            countDisplay.innerText = `0 / ${TARGET_COUNT}`;
            updateMistakeDisplay();

            let indices = Array.from({length: GRID_TOTAL}, (_, i) => i).sort(() => 0.5 - Math.random());
            const targetIndices = indices.slice(0, TARGET_COUNT);

            for (let i = 0; i < GRID_TOTAL; i++) {
                const cell = document.createElement('div');
                cell.className = 'kanji-cell';
                cell.innerText = targetIndices.includes(i) ? currentPair.target.c : currentPair.base.c;
                cell.dataset.target = targetIndices.includes(i);
                cell.onclick = () => handleCellClick(cell);
                gridElement.appendChild(cell);
            }
            
            isPlaying = true;
            if (gameMode === 'HARD') {
                timeLeft = INITIAL_TIME;
                lastTimestamp = Date.now();
                runTimer();
            }
        }

        function handleCellClick(cell) {
            if (!isPlaying || isPaused || cell.classList.contains('found') || cell.classList.contains('missed')) return;
            
            if (cell.dataset.target === 'true') {
                cell.classList.add('found');
                foundCount++;
                countDisplay.innerText = `${foundCount} / ${TARGET_COUNT}`;
                if (foundCount === TARGET_COUNT) endRound(true);
            } else {
                cell.classList.add('missed');
                if (gameMode === 'HARD') {
                    timeLeft = Math.max(0, timeLeft - 1500); 
                } else {
                    mistakes++;
                    updateMistakeDisplay();
                    if (mistakes >= MAX_MISTAKES) {
                        endRound(false);
                    }
                }
                gridElement.classList.add('animate-shake');
                setTimeout(() => gridElement.classList.remove('animate-shake'), 300);
            }
        }

        function runTimer() {
            if (!isPlaying || isPaused || gameMode === 'EASY') return;
            const now = Date.now();
            timeLeft -= (now - lastTimestamp);
            lastTimestamp = now;
            
            if (timeLeft <= 0) { 
                timeLeft = 0; 
                endRound(false); 
            }
            
            timeDisplay.innerText = (timeLeft / 1000).toFixed(2);
            timerBarInner.style.width = (timeLeft / INITIAL_TIME * 100) + '%';
            
            if (isPlaying) {
                animationFrameId = requestAnimationFrame(runTimer);
            }
        }

        function endRound(success) {
            isPlaying = false;
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            
            roundResults.push({
                pair: currentPair,
                success: success
            });

            if (success) correctRounds++;
            
            Array.from(gridElement.children).forEach(c => {
                if(c.dataset.target === 'true') c.classList.add('found');
            });

            setTimeout(() => showInter(success), 800);
        }

        function showInter(success) {
            document.getElementById('info-target-char').innerText = currentPair.target.c;
            document.getElementById('info-target-yomi').innerText = currentPair.target.y;
            document.getElementById('info-target-jukugo').innerText = `例: ${currentPair.target.j}`;
            
            document.getElementById('info-base-char').innerText = currentPair.base.c;
            document.getElementById('info-base-yomi').innerText = currentPair.base.y;
            document.getElementById('info-base-jukugo').innerText = `例: ${currentPair.base.j}`;

            const icon = document.getElementById('inter-icon');
            const text = document.getElementById('inter-text');
            icon.innerText = success ? '⭕' : '❌';
            text.innerText = success ? '正解！' : '失敗...';
            text.className = `text-2xl font-black mb-3 ${success ? 'text-emerald-600' : 'text-red-600'}`;

            interScreen.classList.remove('hidden');
        }

        document.getElementById('next-btn').onclick = () => {
            interScreen.classList.add('hidden');
            if (currentRound < TOTAL_ROUNDS) {
                currentRound++;
                initRound();
            } else {
                showFinalResult();
            }
        };

        function showFinalResult() {
            document.getElementById('correct-total').innerText = correctRounds;
            document.getElementById('result-label').innerText = gameMode === 'HARD' ? '正解ラウンド数' : 'クリアラウンド数';
            
            const historyList = document.getElementById('history-list');
            historyList.innerHTML = '';
            
            roundResults.forEach((res, i) => {
                const item = document.createElement('div');
                item.className = 'flex items-center justify-between p-3 bg-white mb-2 rounded-lg shadow-sm border-l-4 ' + (res.success ? 'border-emerald-500' : 'border-red-500');
                item.innerHTML = `
                    <div class="flex items-center gap-3">
                        <span class="text-[10px] font-bold text-slate-400 font-sans w-4">${i+1}</span>
                        <div class="flex items-center gap-1">
                            <span class="text-xl font-black text-red-600">${res.pair.target.c}</span>
                            <span class="text-xl font-medium text-slate-400">${res.pair.base.c}</span>
                        </div>
                        <div class="flex flex-col">
                            <span class="text-[9px] text-slate-400 font-bold leading-none">${res.pair.target.y}</span>
                            <span class="text-[10px] text-slate-600 font-serif leading-tight">${res.pair.target.j}</span>
                        </div>
                    </div>
                    <span class="text-xl">${res.success ? '⭕' : '❌'}</span>
                `;
                historyList.appendChild(item);
            });

            resultScreen.classList.remove('hidden');
        }

        // Handle Quit
        const quitBtn = document.getElementById('quit-btn');
        quitBtn.onclick = () => {
            if (!isPlaying) return;
            isPaused = true;
            pauseOverlay.classList.remove('hidden');
            confirmScreen.classList.remove('hidden');
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
        };

        document.getElementById('confirm-quit-no').onclick = () => {
            confirmScreen.classList.add('hidden');
            pauseOverlay.classList.add('hidden');
            isPaused = false;
            if (gameMode === 'HARD') {
                lastTimestamp = Date.now();
                runTimer();
            }
        };

        document.getElementById('confirm-quit-yes').onclick = () => {
            confirmScreen.classList.add('hidden');
            pauseOverlay.classList.add('hidden');
            isPlaying = false;
            startScreen.classList.remove('hidden');
        };

        document.getElementById('start-hard-btn').onclick = () => selectMode('HARD');
        document.getElementById('start-easy-btn').onclick = () => selectMode('EASY');
        document.getElementById('restart-btn').onclick = () => {
            resultScreen.classList.add('hidden');
            startScreen.classList.remove('hidden');
        };
    </script>
